spring:
  application:
    name: backend

  # ===== 数据源配置（使用 HikariCP，Spring Boot 默认） =====
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/exam_system?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf-8&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    # HikariCP 连接池配置（可选）
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ===== 如果不想改 pom.xml，用这行禁用 Druid 自动配置 =====
  # autoconfigure:
  #   exclude: com.alibaba.druid.spring.boot.autoconfigure.DruidDataSourceAutoConfigure

server:
  port: ${PORT:8080}

mybatis-plus:
  type-aliases-package: com.hbnu.pojo
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

auth:
  whitelist:
    - /api/login
    - /api/health
    - /api/session/list
    - /api/session/detail/**
    - /api/session/monitor/**
